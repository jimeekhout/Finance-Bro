<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finance Bro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #11141B; color: #ECEAE3; }

@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

.pf-root{
  --bg:#11141B; --bg2:#0C0F15; --surface:#1A1F2A; --surface2:#232938;
  --line:#2A3140; --line2:#3A4357;
  --ink:#ECEAE3; --muted:#8B92A2; --faint:#5C6472;
  --gain:#79C7A0; --loss:#E2917E; --brass:#CBA135; --brass-dim:#8C7126;
  font-family:'Inter',system-ui,sans-serif;
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(203,161,53,.06), transparent 60%),
    var(--bg);
  color:var(--ink);
  min-height:100vh; width:100%;
  -webkit-font-smoothing:antialiased;
}
.pf-wrap{ max-width:1080px; margin:0 auto; padding:28px 22px 64px; }

/* header + ticker tape */
.pf-top{ display:flex; align-items:baseline; justify-content:space-between; gap:18px; flex-wrap:wrap; border-bottom:1px solid var(--line); padding-bottom:16px; }
.pf-brand{ font-family:'Fraunces',serif; font-weight:600; font-size:25px; letter-spacing:.04em; }
.pf-brand .dot{ color:var(--brass); }
.pf-sub{ font-size:11px; letter-spacing:.22em; text-transform:uppercase; color:var(--faint); }
.pf-asof{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); }

/* portfolio tabs */
.tabs{ display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:16px; flex-wrap:wrap; }
.tabs-list{ display:flex; align-items:center; gap:7px; flex-wrap:wrap; }
.tab{ display:inline-flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--line); color:var(--muted); border-radius:9px; padding:8px 13px; font-size:13px; font-family:'Inter',sans-serif; cursor:pointer; transition:.14s; }
.tab:hover{ color:var(--ink); border-color:var(--line2); }
.tab.on{ background:var(--surface2); border-color:var(--brass-dim); color:var(--ink); }
.tab .tab-n{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--faint); background:var(--bg2); border-radius:20px; padding:1px 7px; }
.tab.on .tab-n{ color:var(--brass); }
.tab.add{ color:var(--faint); border-style:dashed; }
.tab.add:hover{ color:var(--brass); border-color:var(--brass-dim); }
.tab-rename{ background:var(--bg2); border:1px solid var(--brass); border-radius:9px; color:var(--ink); padding:8px 12px; font-size:13px; font-family:'Inter',sans-serif; outline:none; min-width:140px; }
.tabs-tools{ display:flex; align-items:center; gap:5px; }
.ttool{ background:none; border:1px solid var(--line); color:var(--faint); cursor:pointer; font-size:13px; line-height:1; padding:7px 9px; border-radius:8px; transition:.14s; }
.ttool:hover{ color:var(--ink); border-color:var(--line2); }
.ttool.danger{ color:var(--loss); border-color:var(--loss); }
.ttool.del{ font-size:12px; }
.ttool.del:hover{ color:var(--loss); border-color:var(--loss); }
.ttool.on-acc{ color:var(--brass); border-color:var(--brass-dim); background:rgba(203,161,53,.08); }
.del-confirm{ display:inline-flex; align-items:center; gap:5px; font-size:12px; color:var(--muted); font-family:'IBM Plex Mono',monospace; }
.tab.calc-tab{ border-color:var(--line2); }
.tab-sep{ width:1px; height:22px; background:var(--line2); margin:0 4px; flex:none; }

/* calculator tab */
.calc-wrap{ margin-top:20px; display:flex; flex-direction:column; gap:16px; }
.calc-section{ background:linear-gradient(180deg,var(--surface),var(--bg2)); border:1px solid var(--line); border-radius:12px; padding:22px 24px; }
.calc-section h3{ font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--faint); margin:0 0 18px; font-weight:600; }
.calc-title{ font-family:'Fraunces',serif; font-size:20px; font-weight:600; margin-bottom:8px; }
.calc-desc{ font-size:13px; color:var(--muted); line-height:1.6; margin-bottom:20px; }
.calc-empty{ text-align:center; padding:40px 20px; color:var(--muted); font-size:13.5px; }
.loan-phases{ display:flex; flex-direction:column; gap:14px; }
.loan-phase{ display:grid; grid-template-columns:12px 1fr 140px; gap:14px; align-items:end; }
.phase-dot{ width:10px; height:10px; border-radius:50%; margin-bottom:12px; flex:none; }
.loan-pillars{ display:grid; grid-template-columns:repeat(4,1fr); gap:1px; background:var(--line); border:1px solid var(--line); border-radius:12px; overflow:hidden; }
.loan-pill{ background:linear-gradient(180deg,var(--surface),var(--bg2)); padding:18px 20px; }
.loan-big{ font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:26px; margin-top:6px; line-height:1; }
@media(max-width:680px){ .loan-pillars{ grid-template-columns:1fr 1fr; } .loan-phase{ grid-template-columns:12px 1fr; } }
.loan-table{ overflow-x:auto; }
.loan-th, .loan-tr{ display:grid; grid-template-columns:80px repeat(4, 1fr); gap:8px; padding:10px 4px; font-size:12.5px; border-bottom:1px solid var(--line); }
.loan-th{ font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--faint); }
.loan-tr:last-child{ border-bottom:none; }
.loan-tr:hover{ background:var(--surface); }
.num-mono{ font-family:'IBM Plex Mono',monospace; text-align:right; }
.port-rate-row{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:16px; }
.port-rate-lbl{ font-size:13px; color:var(--muted); }
.port-rate-pct{ font-size:13px; color:var(--muted); }
.port-rate-cur{ font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--brass); margin-left:4px; }
.port-rate-tip{ font-size:12px; color:var(--faint); font-style:italic; }
.cross-banner{ margin-bottom:14px; padding:12px 16px; border-radius:9px; border:1px solid var(--brass-dim); background:rgba(203,161,53,.08); font-size:13px; color:var(--ink); line-height:1.5; }
.cross-banner b{ color:var(--brass); }
.cross-banner.warn{ border-color:var(--loss); background:rgba(226,145,126,.07); }
.cross-banner.warn b{ color:var(--loss); }

/* account tab */
.acc-grid{ display:flex; align-items:center; gap:20px; flex-wrap:wrap; }
.acc-avatar{ width:64px; height:64px; border-radius:50%; background:linear-gradient(135deg,var(--brass),var(--brass-dim)); display:flex; align-items:center; justify-content:center; font-family:'Fraunces',serif; font-size:28px; font-weight:600; color:#1A1206; flex:none; }
.acc-name{ font-size:18px; font-weight:600; color:var(--ink); margin-bottom:4px; }
.acc-email{ font-family:'IBM Plex Mono',monospace; font-size:13px; color:var(--muted); margin-bottom:4px; }
.acc-joined{ font-size:12px; color:var(--faint); }

/* budget tab */
.budget-income{ display:grid; grid-template-columns:1fr auto; gap:16px; align-items:end; margin-bottom:20px; }
@media(max-width:680px){ .budget-income{ grid-template-columns:1fr; } }
.budget-net-box{ background:var(--bg2); border:1px solid var(--line); border-radius:10px; padding:14px 18px; text-align:right; }
.budget-net-big{ font-family:'IBM Plex Mono',monospace; font-size:28px; font-weight:600; color:var(--gain); }
.tax-breakdown{ margin-top:4px; border:1px solid var(--line); border-radius:10px; overflow:hidden; }
.tax-title{ font-size:10.5px; letter-spacing:.15em; text-transform:uppercase; color:var(--faint); padding:11px 14px; background:var(--bg2); border-bottom:1px solid var(--line); }
.tax-rows{ display:flex; flex-direction:column; }
.tax-row{ display:grid; grid-template-columns:1fr auto auto; gap:10px; padding:9px 14px; border-bottom:1px solid var(--line); font-size:12.5px; align-items:center; }
.tax-row:last-child{ border-bottom:none; }
.tax-row.korting{ background:rgba(121,199,160,.04); }
.tax-row.total{ background:var(--bg2); font-weight:600; font-size:13px; }
.tax-label{ color:var(--muted); }
.tax-base{ font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--faint); text-align:right; }
.tax-amt{ font-family:'IBM Plex Mono',monospace; font-size:12.5px; text-align:right; min-width:90px; color:var(--ink); }
.budget-cats{ display:flex; flex-direction:column; gap:8px; }
.budget-cat-h{ display:grid; grid-template-columns:1fr 140px 60px 32px; gap:10px; font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--faint); padding:0 2px 6px; }
.budget-cat-r{ display:grid; grid-template-columns:1fr 140px 60px 32px; gap:10px; align-items:center; }
.fixed-btn{ font-family:'IBM Plex Mono',monospace; font-size:11px; padding:6px 9px; border-radius:7px; border:1px solid var(--line2); background:var(--surface); color:var(--faint); cursor:pointer; }
.fixed-btn.on{ border-color:var(--brass-dim); color:var(--brass); background:rgba(203,161,53,.08); }
@media(max-width:680px){ .budget-cat-h{ display:none; } .budget-cat-r{ grid-template-columns:1fr 100px 50px 28px; } }
.budget-month-bar{ display:flex; align-items:center; gap:8px; margin-top:20px; margin-bottom:4px; flex-wrap:wrap; }
.budget-month-sel{ flex:1; min-width:180px; font-size:14px; padding:9px 12px; }

/* transactions tab */
.trans-bar{ display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-top:20px; margin-bottom:4px; }
.trans-h{ display:grid; grid-template-columns:90px 1fr 130px 110px 60px; gap:10px; align-items:center; padding:11px 18px; background:var(--bg2); border-bottom:1px solid var(--line); font-size:10.5px; letter-spacing:.13em; text-transform:uppercase; color:var(--faint); }
.trans-r{ display:grid; grid-template-columns:90px 1fr 130px 110px 60px; gap:10px; align-items:center; padding:12px 18px; border-bottom:1px solid var(--line); font-size:13.5px; }
.trans-r:last-child{ border-bottom:none; }
.trans-r:hover{ background:var(--surface); }
.th-btn{ cursor:pointer; user-select:none; }
.th-btn:hover{ color:var(--ink); }
.cat-chip{ display:inline-block; font-size:11px; padding:3px 9px; border-radius:20px; background:var(--surface2); color:var(--muted); border:1px solid var(--line2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:120px; }
@media(max-width:680px){ .trans-h{ display:none; } .trans-r{ grid-template-columns:1fr auto; gap:4px 10px; } }

/* budget vs actual bars */
.bvg-rows{ display:flex; flex-direction:column; gap:10px; }
.bvg-row{ display:grid; grid-template-columns:140px 1fr 90px 80px 90px; gap:10px; align-items:center; font-size:13px; }
.bvg-label{ color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.bvg-bar-track{ height:8px; background:var(--line); border-radius:4px; overflow:hidden; }
.bvg-bar{ height:100%; border-radius:4px; transition:width .3s; }
.bvg-amt{ font-family:'IBM Plex Mono',monospace; font-size:12.5px; text-align:right; }
.bvg-budget{ font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--faint); }
.bvg-diff{ font-family:'IBM Plex Mono',monospace; font-size:12px; text-align:right; }
@media(max-width:680px){ .bvg-row{ grid-template-columns:1fr auto auto; } .bvg-bar-track{ display:none; } .bvg-budget{ display:none; } }

/* budget tab */
.budget-income{ display:grid; grid-template-columns:1fr 160px auto; gap:16px; align-items:end; }
@media(max-width:680px){ .budget-income{ grid-template-columns:1fr 1fr; } }
.budget-net{ background:var(--bg2); border:1px solid var(--line2); border-radius:10px; padding:12px 14px; }
.budget-net-val{ font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:22px; color:var(--gain); margin-top:4px; }
.budget-net-sub{ font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--faint); margin-top:3px; }
.budget-mid{ display:flex; gap:16px; flex-wrap:wrap; }
.budget-cats{ display:flex; flex-direction:column; gap:6px; }
.budget-cat-h{ display:grid; grid-template-columns:1fr 110px 34px 28px; gap:8px; font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--faint); padding:0 2px 4px; border-bottom:1px solid var(--line); }
.budget-cat-r{ display:grid; grid-template-columns:1fr 110px 34px 28px; gap:8px; align-items:center; }
.cat-name-inp{ background:var(--bg2); border:1px solid var(--line2); border-radius:7px; color:var(--ink); padding:8px 10px; font-size:13px; font-family:'Inter',sans-serif; outline:none; }
.cat-name-inp:focus{ border-color:var(--brass-dim); }
.cat-amt-inp{ background:var(--bg2); border:1px solid var(--line2); border-radius:7px; color:var(--ink); padding:8px 10px; font-family:'IBM Plex Mono',monospace; font-size:13px; outline:none; text-align:right; }
.cat-amt-inp:focus{ border-color:var(--brass-dim); }
.fix-btn{ background:var(--surface2); border:1px solid var(--line2); border-radius:7px; color:var(--faint); cursor:pointer; font-size:12px; font-weight:600; height:36px; transition:.14s; }
.fix-btn.on{ background:rgba(203,161,53,.15); border-color:var(--brass-dim); color:var(--brass); }
.budget-total-row{ display:flex; justify-content:space-between; align-items:center; margin-top:14px; padding-top:12px; border-top:1px solid var(--line); font-size:13.5px; font-weight:600; }
.savings-info{ display:flex; flex-direction:column; gap:8px; margin-top:14px; }
.savings-row{ display:flex; justify-content:space-between; align-items:center; font-size:13px; padding:6px 0; border-bottom:1px solid var(--line); }
.savings-row:last-child{ border-bottom:none; font-size:14px; }
.budget-legend{ display:flex; flex-direction:column; gap:7px; }

.tape{ margin-top:14px; border:1px solid var(--line); border-radius:8px; background:linear-gradient(var(--surface),var(--bg2)); overflow:hidden; height:38px; position:relative; }
.tape-track{ display:flex; gap:34px; align-items:center; height:100%; white-space:nowrap; padding-left:20px; animation:scroll 38s linear infinite; }
.tape-item{ font-family:'IBM Plex Mono',monospace; font-size:12.5px; color:var(--muted); display:inline-flex; gap:9px; align-items:center; }
.tape-item b{ color:var(--ink); font-weight:600; letter-spacing:.03em; }
@keyframes scroll{ from{transform:translateX(0)} to{transform:translateX(-50%)} }
@media (prefers-reduced-motion:reduce){ .tape-track{ animation:none; flex-wrap:wrap; white-space:normal; height:auto; padding:8px 20px; } .tape{height:auto;} }

/* hero pillars */
.pillars{ display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--line); border:1px solid var(--line); border-radius:12px; overflow:hidden; margin-top:22px; }
.pillar{ background:linear-gradient(180deg,var(--surface),var(--bg2)); padding:24px 26px; }
.pillar .lbl{ font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--faint); }
.pillar .big{ font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:38px; letter-spacing:-.01em; margin-top:8px; line-height:1; }
.pillar .meta{ font-family:'IBM Plex Mono',monospace; font-size:13.5px; margin-top:11px; color:var(--muted); }
.pillar.income .big{ color:var(--brass); }
.gain{ color:var(--gain); } .loss{ color:var(--loss); }
.tri{ font-size:11px; }
@media (max-width:680px){ .pillars{ grid-template-columns:1fr; } .pillar .big{ font-size:32px; } }

/* mid row */
.mid{ display:grid; grid-template-columns:300px 1fr; gap:16px; margin-top:16px; }
@media (max-width:680px){ .mid{ grid-template-columns:1fr; } }
.card{ background:linear-gradient(180deg,var(--surface),var(--bg2)); border:1px solid var(--line); border-radius:12px; padding:20px; }
.card h3{ font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--faint); margin:0 0 16px; font-weight:600; }
.donut-row{ display:flex; align-items:center; gap:18px; }
.legend{ display:flex; flex-direction:column; gap:9px; min-width:0; flex:1; }
.legend-item{ display:flex; align-items:center; gap:9px; font-size:12.5px; min-width:0; }
.legend-item .sw{ width:9px; height:9px; border-radius:2px; flex:none; }
.legend-item .nm{ color:var(--ink); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.legend-item .pc{ font-family:'IBM Plex Mono',monospace; color:var(--muted); margin-left:auto; }

.statgrid{ display:grid; grid-template-columns:1fr 1fr; gap:14px 22px; }
.stat .k{ font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--faint); }
.stat .v{ font-family:'IBM Plex Mono',monospace; font-size:20px; margin-top:5px; }

/* table */
.holds{ margin-top:16px; border:1px solid var(--line); border-radius:12px; overflow:hidden; }
.holds-h, .holds-r{ display:grid; grid-template-columns:1.5fr .6fr .85fr .85fr 1fr 1fr 1fr .65fr 60px; gap:9px; align-items:center; padding:13px 16px; }
.holds-h{ background:var(--bg2); font-size:10.5px; letter-spacing:.13em; text-transform:uppercase; color:var(--faint); border-bottom:1px solid var(--line); }
.holds-r{ border-bottom:1px solid var(--line); font-size:13.5px; }
.holds-r:last-child{ border-bottom:none; }
.holds-r:hover{ background:var(--surface); }
.num{ font-family:'IBM Plex Mono',monospace; text-align:right; }
.tk{ display:flex; flex-direction:column; gap:2px; min-width:0; }
.tk b{ font-family:'IBM Plex Mono',monospace; font-weight:600; letter-spacing:.04em; }
.tk span{ font-size:11px; color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.xbtn{ background:none; border:none; color:var(--faint); cursor:pointer; font-size:16px; line-height:1; padding:4px; border-radius:6px; }
.xbtn:hover{ color:var(--loss); background:var(--surface2); }
.xcell{ display:flex; gap:2px; justify-content:flex-end; align-items:center; }
.xbtn.ebtn{ font-size:13px; }
.xbtn.ebtn:hover{ color:var(--brass); }
.editable{ cursor:pointer; }
.editable .ed-val{ border-bottom:1px dashed var(--line2); padding-bottom:1px; transition:.12s; }
.editable:hover .ed-val{ color:var(--brass); border-bottom-color:var(--brass); }
.edit-inp{ width:74px; max-width:100%; background:var(--bg2); border:1px solid var(--brass-dim); border-radius:6px; color:var(--ink); padding:4px 7px; font-family:'IBM Plex Mono',monospace; font-size:13px; text-align:right; outline:none; }
.edit-inp:focus{ border-color:var(--brass); }
@media (max-width:680px){
  .holds-h{ display:none; }
  .holds-r{ grid-template-columns:1fr auto; gap:6px 10px; }
  .holds-r > *{ text-align:left; }
  .holds-r .num::before{ content:attr(data-l); display:block; font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--faint); }
  .holds-r .xcell{ grid-column:2; grid-row:1; }
}

/* actions / form */
.actions{ display:flex; gap:10px; margin-top:18px; flex-wrap:wrap; }
.btn{ font-family:'Inter',sans-serif; font-size:13.5px; font-weight:500; border-radius:9px; padding:11px 18px; cursor:pointer; border:1px solid var(--line2); background:var(--surface2); color:var(--ink); transition:.15s; }
.btn:hover{ border-color:var(--brass-dim); }
.btn.primary{ background:var(--brass); color:#1A1206; border-color:var(--brass); font-weight:600; }
.btn.primary:hover{ filter:brightness(1.07); }
.btn:disabled{ opacity:.5; cursor:default; }

/* auto-refresh control */
.auto-ctl{ display:flex; align-items:center; gap:9px; margin-left:auto; flex-wrap:wrap; }
.switch{ width:38px; height:22px; border-radius:11px; border:1px solid var(--line2); background:var(--surface2); position:relative; cursor:pointer; padding:0; transition:.18s; flex:none; }
.switch .knob{ position:absolute; top:2px; left:2px; width:16px; height:16px; border-radius:50%; background:var(--faint); transition:.18s; }
.switch.on{ background:var(--brass-dim); border-color:var(--brass); }
.switch.on .knob{ left:18px; background:var(--brass); }
.auto-lbl{ font-size:13px; color:var(--muted); cursor:pointer; user-select:none; }
.auto-int{ background:var(--bg2); border:1px solid var(--line2); border-radius:8px; color:var(--ink); padding:7px 9px; font-family:'IBM Plex Mono',monospace; font-size:12.5px; outline:none; cursor:pointer; }
.auto-int:disabled{ opacity:.45; cursor:default; }
.auto-next{ font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--faint); }
@media (max-width:680px){ .auto-ctl{ margin-left:0; width:100%; } }
.btn .spin{ display:inline-block; width:12px; height:12px; border:2px solid currentColor; border-right-color:transparent; border-radius:50%; animation:sp .7s linear infinite; vertical-align:-1px; margin-right:7px; }
@keyframes sp{ to{ transform:rotate(360deg); } }

.form{ margin-top:14px; border:1px dashed var(--line2); border-radius:12px; padding:18px; display:flex; flex-direction:column; gap:14px; }
.form-head{ font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--brass); font-weight:600; }
.form-row{ display:grid; grid-template-columns:.9fr 1fr auto; gap:12px; align-items:end; }

.search-wrap{ position:relative; }
.results{ position:absolute; top:100%; left:0; right:0; margin-top:6px; background:var(--surface2); border:1px solid var(--line2); border-radius:10px; overflow:hidden; z-index:30; box-shadow:0 18px 44px rgba(0,0,0,.5); max-height:300px; overflow-y:auto; }
.result{ display:flex; align-items:center; gap:12px; padding:11px 14px; cursor:pointer; border-bottom:1px solid var(--line); }

.result .r-main{ min-width:0; flex:1; display:flex; flex-direction:column; gap:2px; }

/* dividend calendar */

function PortfolioDashboard() {
  const [portfolios, setPortfolios] = useState([]);
  const [activeId, setActiveId] = useState(null);
  const [renaming, setRenaming] = useState(false);
  const [renameVal, setRenameVal] = useState("");
  const [confirmDel, setConfirmDel] = useState(false);
  const [loaded, setLoaded] = useState(false);
  const activePortfolio = portfolios.find(p => p.id === activeId) || portfolios[0] || null;
  const holdings = activePortfolio ? activePortfolio.holdings : [];
  const setHoldings = updater => {
    setPortfolios(prev => prev.map(p => p.id === activeId ? {
      ...p,
      holdings: typeof updater === "function" ? updater(p.holdings) : updater
    } : p));
  };
  const [refreshing, setRefreshing] = useState(false);
  const [asOf, setAsOf] = useState(null);
  const [error, setError] = useState("");
  const [showForm, setShowForm] = useState(false);
  const [hoverMonth, setHoverMonth] = useState(null);
  const [showImport, setShowImport] = useState(false);
  const [importText, setImportText] = useState("");
  const [importing, setImporting] = useState(false);
  const [importMsg, setImportMsg] = useState("");
  const [searchQuery, setSearchQuery] = useState("");
  const [searchResults, setSearchResults] = useState([]);
  const [searching, setSearching] = useState(false);
  const [noResults, setNoResults] = useState(false);
  const [selected, setSelected] = useState(null);
  const searchSeq = useRef(0);
  const [editId, setEditId] = useState(null);
  const [editField, setEditField] = useState(null);
  const [editVal, setEditVal] = useState("");
  const [editingId, setEditingId] = useState(null);
  const [auto, setAuto] = useState(false);
  const [intervalMin, setIntervalMin] = useState(15);
  const [apiKey, setApiKey] = useState("");
  const [showRt, setShowRt] = useState(false);
  const [activeTab, setActiveTab] = useState("portfolio"); // "portfolio" | "calc"
  const [loan, setLoan] = useState({
    phases: [{
      label: "Fase 1",
      principal: "",
      rate: ""
    }, {
      label: "Fase 2",
      principal: "",
      rate: ""
    }, {
      label: "Fase 3",
      principal: "",
      rate: ""
    }],
    years: 10
  });
  const [portRate, setPortRate] = useState("7");
  const [budget, setBudget] = useState(DEFAULT_BUDGET);
  const [transactions, setTransactions] = useState([]);
  const [rtMsg, setRtMsg] = useState("");
  const [form, setForm] = useState({
    ticker: "",
    shares: "",
    avgCost: "",
    buyDate: "",
    divReceived: ""
  });
  const didInit = useRef(false);

  /* load portfolios + settings (migrate from single-portfolio store) */
  useEffect(() => {
    (async () => {
      let meta = null;
      try {
        const rm = function () {
          try {
            var _v = localStorage.getItem(META_KEY);
            return _v != null ? {
              value: _v
            } : null;
          } catch (e) {
            return null;
          }
        }();
        if (rm && rm.value) meta = JSON.parse(rm.value);
      } catch (e) {/* none yet */}
      if (meta && Array.isArray(meta.portfolios) && meta.portfolios.length) {
        const ps = meta.portfolios.map(p => ({
          id: p.id || uid(),
          name: p.name || "Portefeuille",
          holdings: normHoldings(p.holdings)
        }));
        setPortfolios(ps);
        setActiveId(meta.activeId && ps.some(p => p.id === meta.activeId) ? meta.activeId : ps[0].id);
      } else {
        let migrated = [];
        try {
          const r = function () {
            try {
              var _v = localStorage.getItem(STORE_KEY);
              return _v != null ? {
                value: _v
              } : null;
            } catch (e) {
              return null;
            }
          }();
          if (r && r.value) migrated = normHoldings(JSON.parse(r.value));
        } catch (e) {/* none */}
        const id = uid();
        setPortfolios([{
          id,
          name: "Mijn portefeuille",
          holdings: migrated
        }]);
        setActiveId(id);
      }
      try {
        const rs = function () {
          try {
            var _v = localStorage.getItem(SETTINGS_KEY);
            return _v != null ? {
              value: _v
            } : null;
          } catch (e) {
            return null;
          }
        }();
        if (rs && rs.value) {
          const st = JSON.parse(rs.value);
          setAuto(!!st.auto);
          if (st.intervalMin) setIntervalMin(st.intervalMin);
          if (st.apiKey) setApiKey(st.apiKey);
        }
      } catch (e) {/* no saved settings yet — fine */}
      try {
        const rc = function () {
          try {
            var _v = localStorage.getItem(CALC_KEY);
            return _v != null ? {
              value: _v
            } : null;
          } catch (e) {
            return null;
          }
        }();
        if (rc && rc.value) {
          const cd = JSON.parse(rc.value);
          if (cd.loan) setLoan(cd.loan);
          if (cd.portRate) setPortRate(cd.portRate);
        }
      } catch (e) {/* no saved calc data yet */}
      try {
        const rb = function () {
          try {
            var _v = localStorage.getItem(BUDGET_KEY);
            return _v != null ? {
              value: _v
            } : null;
          } catch (e) {
            return null;
          }
        }();
        if (rb && rb.value) {
          const bd = JSON.parse(rb.value);
          if (bd) {
            // migrate old single-month format
            if (bd.salaryGross !== undefined || bd.categories !== undefined) {
              const month = new Date().toISOString().slice(0, 7);
              setBudget({
                months: {
                  [month]: {
                    salaryGross: bd.salaryGross || "",
                    categories: bd.categories || DEFAULT_MONTH_BUDGET.categories,
                    savingsTarget: bd.savingsTarget || ""
                  }
                },
                activeMonth: month
              });
            } else {
              setBudget(prev => ({
                ...prev,
                ...bd
              }));
            }
          }
        }
      } catch (e) {/* no saved budget yet */}
      try {
        const rt = function () {
          try {
            var _v = localStorage.getItem(TRANS_KEY);
            return _v != null ? {
              value: _v
            } : null;
          } catch (e) {
            return null;
          }
        }();
        if (rt && rt.value) setTransactions(JSON.parse(rt.value));
      } catch (e) {/* no transactions yet */}
      setLoaded(true);
    })();
  }, []);

  /* persist portfolios on change */
  useEffect(() => {
    if (!loaded) return;
    if (!didInit.current) {
      didInit.current = true;
      return;
    }
    (function () {
      try {
        localStorage.setItem(META_KEY, JSON.stringify({
          portfolios,
          activeId

      } catch (e) {}

  }, [portfolios, activeId, loaded]);

  /* persist settings on change */
  useEffect(() => {
    if (!loaded) return;
    (function () {
      try {
        localStorage.setItem(SETTINGS_KEY, JSON.stringify({
          auto,

  /* ---- derived totals ---- */
  const t = useMemo(() => {
    let mvTotal = 0,
      cost = 0,
      income = 0,
      recTotal = 0;
    const priced = holdings.map(h => {
      const fx = h.fxToEur != null ? h.fxToEur : 1;
      const priceEur = h.priceNative != null ? h.priceNative * fx : null;
      const mv = priceEur != null ? priceEur * h.shares : null;
      const c = h.avgCost * h.shares * fx;
      const dy = h.dividendYield != null ? h.dividendYield : 0;
      let recDiv = 0;
      if (mv != null) {
        if (h.divReceived != null) recDiv = h.divReceived;else if (h.buyDate) {
          const yrs = Math.max(0, (Date.now() - Date.parse(h.buyDate)) / (365.25 * 864e5));
          if (!isNaN(yrs)) recDiv = mv * (dy / 100) * yrs;
        }
      }
      const v = mv != null ? mv + recDiv : null;
      if (mv != null) {
        mvTotal += mv;
        income += mv * dy / 100;
        recTotal += recDiv;
      }
      cost += c;
      return {
        ...h,
        priceEur,
        mv,
        recDiv,
        value: v,
        cost: c
      };
    }).sort((a, b) => a.ticker.localeCompare(b.ticker));
    const value = mvTotal + recTotal;
    const gain = value - (priced.some(p => p.value != null) ? cost : 0);
    const gainPct = cost > 0 && value > 0 ? gain / cost * 100 : null;
    const yld = mvTotal > 0 ? income / mvTotal * 100 : null;
    const yldCost = cost > 0 && income > 0 ? income / cost * 100 : null;
    return {
      priced,
      value,
      mvTotal,
      recTotal,
      cost,
      gain,
      gainPct,
      income,
      yld,
      yldCost
    };
  }, [holdings]);
  const allocation = useMemo(() => {
    const items = t.priced.filter(p => p.mv != null && p.mv > 0).sort((a, b) => b.mv - a.mv);
    const total = items.reduce((s, p) => s + p.mv, 0) || 1;
    return items.map((p, i) => ({
      ...p,
      share: p.mv / total * 100,
      color: SEG[i % SEG.length]
    }));
  }, [t.priced]);

  /* ---- dividend per maand ---- */
  const cal = useMemo(() => {
    const months = Array.from({
      length: 12
    }, () => ({
      amt: 0,
      tickers: []
    }));
    let unscheduled = 0;
    t.priced.forEach(h => {
      if (h.value == null || !h.dividendYield) return;
      const annual = h.value * h.dividendYield / 100;
      const pm = Array.isArray(h.payMonths) ? h.payMonths.filter(m => m >= 1 && m <= 12) : [];
      if (!pm.length) {
        unscheduled += annual;
        return;
      }
      const per = annual / pm.length;
      pm.forEach(m => {
        months[m - 1].amt += per;
        months[m - 1].tickers.push(h.ticker);
      });
    });
    const max = Math.max(...months.map(m => m.amt), 0.0001);
    const total = months.reduce((s, m) => s + m.amt, 0) + unscheduled;
    const best = months.reduce((bi, m, i, arr) => m.amt > arr[bi].amt ? i : bi, 0);
    const active = months.filter(m => m.amt > 0).length;
    return {
      months,
      max,
      total,
      unscheduled,
      best,
      active
    };
  }, [t.priced]);

  /* ---- live price fetch via Anthropic API + web search ---- */

    const items = list.filter(h => {
      const k = h.ticker.toUpperCase();
      if (seen.has(k)) return false;
      seen.add(k);
      return true;
    }).map(h => `- ${h.ticker.toUpperCase()}${h.name ? ` (${h.name})` : ""}${h.currency ? `, valuta ${h.currency}` : ""}${h.isin ? `, ISIN ${h.isin}` : ""}`);
    const prompt = `Zoek de meest recente beurskoers en de dividendgegevens op voor deze specifieke effecten:\n${items.join("\n")}\n` + `Het zijn aandelen of ETF's, veelal verhandeld op Euronext Amsterdam, NYSE of Nasdaq.\n` + `BELANGRIJK: gebruik exact het opgegeven bedrijf, de valuta en/of de ISIN om tickerverwarring te voorkomen. ` + `Veel symbolen bestaan op meerdere beurzen (bv. "ASM" = ASM International op Euronext Amsterdam in EUR, ` + `NIET Avino Silver in USD). Bij twijfel volgt de opgegeven valuta de juiste notering.\n` + `Geef per effect: ticker (exact zoals opgegeven), name (officiële naam), priceNative (actuele koers in de eigen ` + `handelsvaluta, number), currency (ISO-valutacode van die koers), fxToEur (wisselkoers om 1 eenheid van die ` + `valuta naar euro om te rekenen, number; 1 als de valuta al EUR is), dividendYield (verwacht bruto ` + `dividendrendement in %, number, 0 als geen dividend), en payMonths (maanden van uitkering als array 1-12, leeg [] als geen).\n` + `Antwoord UITSLUITEND met een geldige JSON-array, zonder uitleg, zonder markdown. Formaat:\n` + `[{"ticker":"ASM","name":"ASM International NV","priceNative":630.20,"currency":"EUR","fxToEur":1,"dividendYield":0.5,"payMonths":[5]}]`;
    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": getAnthropicKey(),
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true"
        },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",

          messages: [{
            role: "user",

          }]
        })
      });
      const data = await res.json();
      const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n");
      const s = text.indexOf("["),
        e = text.lastIndexOf("]");
      if (s === -1 || e === -1) throw new Error("Geen koersdata gevonden in het antwoord.");
      const quotes = JSON.parse(text.slice(s, e + 1));
      const byT = {};
      quotes.forEach(q => {
        if (q && q.ticker) byT[String(q.ticker).toUpperCase()] = q;
      });
      setHoldings(prev => prev.map(h => {
        const q = byT[h.ticker.toUpperCase()];
        if (!q) return h;
        return {
          ...h,
          name: h.name || q.name || h.ticker,
          priceNative: typeof q.priceNative === "number" ? q.priceNative : h.priceNative,
          currency: q.currency || h.currency || "EUR",
          fxToEur: typeof q.fxToEur === "number" ? q.fxToEur : h.fxToEur != null ? h.fxToEur : 1,
          dividendYield: typeof q.dividendYield === "number" ? q.dividendYield : h.dividendYield,
          payMonths: Array.isArray(q.payMonths) ? q.payMonths : h.payMonths
        };

      setAsOf(new Date());

  /* ---- realtime US quotes via Finnhub (eigen gratis key) ---- */
  async function fetchQuote(symbol, key) {
    try {
      const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(symbol)}&token=${encodeURIComponent(key)}`);
      if (!r.ok) return null;
      const d = await r.json();
      if (typeof d.c === "number" && d.c > 0) return {
        price: d.c,
        dayPct: typeof d.dp === "number" ? d.dp : null
      };
      return null;
    } catch {
      return null;
    }
  }
  async function refreshLive(list = holdings) {
    if (!apiKey) return;
    const usd = list.filter(h => (h.currency || "EUR").toUpperCase() === "USD");
    if (!usd.length) return;
    const tickers = [...new Set(usd.map(h => h.ticker.toUpperCase()))];
    const results = {};
    await Promise.all(tickers.map(async tk => {
      const q = await fetchQuote(tk, apiKey);
      if (q) results[tk] = q;
    }));
    if (!Object.keys(results).length) return;
    setHoldings(prev => prev.map(h => {
      const q = results[h.ticker.toUpperCase()];
      return q ? {
        ...h,
        priceNative: q.price,
        dayPct: q.dayPct,
        live: true
      } : h;
    }));
    setAsOf(new Date());
  }
  async function testKey() {
    const key = apiKey.trim();
    if (!key) {
      setRtMsg("Vul eerst je Finnhub-key in.");
      return;
    }
    setRtMsg("Key testen…");
    try {
      const r = await fetch(`https://finnhub.io/api/v1/quote?symbol=AAPL&token=${encodeURIComponent(key)}`);
      if (r.status === 401 || r.status === 403) {
        setRtMsg("Finnhub weigert de key (" + r.status + "). Gebruik je gewone API-key uit het Finnhub-dashboard (niet de sandbox-key) en bevestig eerst je account-e-mail.");
        return;
      }
      if (r.status === 429) {
        setRtMsg("Te veel aanvragen (429) — de gratis limiet is 60/min. Wacht even en test opnieuw.");
        return;
      }
      if (!r.ok) {
        setRtMsg("Finnhub antwoordde met status " + r.status + ". Probeer het later opnieuw.");
        return;
      }
      const d = await r.json();
      if (typeof d.c === "number" && d.c > 0) {
        setRtMsg("Werkt — realtime koersen actief voor je Amerikaanse posities.");
        refreshLive();
      } else {
        setRtMsg("Verbinding werkt, maar er kwam geen koers terug. Controleer het symbool of probeer later opnieuw.");
      }
    } catch (e) {
      setRtMsg("De aanvraag werd geblokkeerd vóórdat Finnhub kon antwoorden — waarschijnlijk blokkeert deze omgeving (of een adblocker/privacy-extensie) verzoeken naar finnhub.io. Dat ligt niet aan je key.");
    }
  }
